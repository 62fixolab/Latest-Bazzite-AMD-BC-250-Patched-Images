name: Build Bazzite BC-250
on:
  schedule:
    - cron: "40 8 * * *"
  push:
    paths-ignore:
      - "**.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  base-digests:
    name: Check Bazzite stable digests
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.base-digest-cache.outputs.cache-hit }}
      cache-key: ${{ steps.base-digests.outputs.cache-key }}
      deck-digest: ${{ steps.base-digests.outputs.deck-digest }}
      gnome-digest: ${{ steps.base-digests.outputs.gnome-digest }}
      kde-digest: ${{ steps.base-digests.outputs.kde-digest }}
      should-build: ${{ github.event_name != 'schedule' || steps.base-digest-cache.outputs.cache-hit != 'true' }}
    steps:
      - name: Resolve base image digests
        id: base-digests
        run: |
          mkdir -p .base-image-digests

          deck_digest="$(docker buildx imagetools inspect ghcr.io/ublue-os/bazzite-deck:stable | awk '/Digest:/ {print $2; exit}')"
          gnome_digest="$(docker buildx imagetools inspect ghcr.io/ublue-os/bazzite-gnome:stable | awk '/Digest:/ {print $2; exit}')"
          kde_digest="$(docker buildx imagetools inspect ghcr.io/ublue-os/bazzite:stable | awk '/Digest:/ {print $2; exit}')"

          {
            echo "deck=${deck_digest}"
            echo "gnome=${gnome_digest}"
            echo "kde=${kde_digest}"
          } | tee .base-image-digests/digests.txt

          cache_key="bazzite-stable-digests-$(sha256sum .base-image-digests/digests.txt | awk '{print $1}')"
          echo "cache-key=${cache_key}" >> "${GITHUB_OUTPUT}"
          echo "deck-digest=${deck_digest}" >> "${GITHUB_OUTPUT}"
          echo "gnome-digest=${gnome_digest}" >> "${GITHUB_OUTPUT}"
          echo "kde-digest=${kde_digest}" >> "${GITHUB_OUTPUT}"

      - name: Restore base digest cache
        id: base-digest-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: .base-image-digests
          key: ${{ steps.base-digests.outputs.cache-key }}

  bluebuild:
    name: Build Custom Image
    needs: base-digests
    if: needs.base-digests.outputs.should-build == 'true' && github.ref_name != '40cu'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - bazzite-deck-patched.yml
          - bazzite-gnome-patched.yml
          - bazzite-kde-patched.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Maximize build space
        uses: hastd/free-disk-space@68572aeaadb7f76bd408246328e95926323402b5
        with:
          skip-if-available: "80G"

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name bluebuild-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Install BlueBuild
        run: |
          set -euo pipefail

          sudo docker create \
            --name blue-build-installer \
            ghcr.io/blue-build/cli:v0.9-installer
          sudo docker cp blue-build-installer:/out/bluebuild /usr/bin/bluebuild
          sudo docker rm blue-build-installer

          bluebuild --version

      - name: Install cosign
        env:
          COSIGN_VERSION: v3.0.6
        run: |
          set -euo pipefail

          curl -fsSL \
            -o cosign \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          sudo install -m 0755 cosign /usr/local/bin/cosign
          rm cosign

          cosign version

      - name: Build Custom Image
        env:
          BB_BUILD_PUSH: "true"
          BB_PASSWORD: ${{ github.token }}
          BB_USERNAME: ${{ github.repository_owner }}
          BB_REGISTRY: ghcr.io
          BB_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ""
          GH_TOKEN: ${{ github.token }}
          GH_PR_EVENT_NUMBER: ${{ github.event.number }}
          RUST_LOG_STYLE: always
          CLICOLOR_FORCE: "1"
        run: bluebuild build -v "recipes/${{ matrix.recipe }}"

  bluebuild_40cu:
    name: Build Custom 40CU Image
    needs: base-digests
    if: needs.base-digests.outputs.should-build == 'true' && github.ref_name == '40cu'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - bazzite-deck-patched-40cu.yml
          - bazzite-gnome-patched-40cu.yml
          - bazzite-kde-patched-40cu.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Maximize build space
        uses: hastd/free-disk-space@68572aeaadb7f76bd408246328e95926323402b5
        with:
          skip-if-available: "80G"

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name bluebuild-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Install BlueBuild
        run: |
          set -euo pipefail

          sudo docker create \
            --name blue-build-installer \
            ghcr.io/blue-build/cli:v0.9-installer
          sudo docker cp blue-build-installer:/out/bluebuild /usr/bin/bluebuild
          sudo docker rm blue-build-installer

          bluebuild --version

      - name: Install cosign
        env:
          COSIGN_VERSION: v3.0.6
        run: |
          set -euo pipefail

          curl -fsSL \
            -o cosign \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          sudo install -m 0755 cosign /usr/local/bin/cosign
          rm cosign

          cosign version

      - name: Build Custom 40CU Image
        env:
          BB_BUILD_PUSH: "true"
          BB_PASSWORD: ${{ github.token }}
          BB_USERNAME: ${{ github.repository_owner }}
          BB_REGISTRY: ghcr.io
          BB_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          COSIGN_PASSWORD: ""
          GH_TOKEN: ${{ github.token }}
          GH_PR_EVENT_NUMBER: ${{ github.event.number }}
          RUST_LOG_STYLE: always
          CLICOLOR_FORCE: "1"
        run: bluebuild build -v "recipes/${{ matrix.recipe }}"

  save-base-digests:
    name: Save Bazzite stable digest cache
    needs:
      - base-digests
      - bluebuild
      - bluebuild_40cu
    if: always() && needs.base-digests.outputs.cache-hit != 'true' && (needs.bluebuild.result == 'success' || needs.bluebuild_40cu.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Record base image digests
        run: |
          mkdir -p .base-image-digests

          {
            echo "deck=${{ needs.base-digests.outputs.deck-digest }}"
            echo "gnome=${{ needs.base-digests.outputs.gnome-digest }}"
            echo "kde=${{ needs.base-digests.outputs.kde-digest }}"
          } | tee .base-image-digests/digests.txt

      - name: Save base digest cache
        uses: actions/cache/save@v5.0.5
        with:
          path: .base-image-digests
          key: ${{ needs.base-digests.outputs.cache-key }}
